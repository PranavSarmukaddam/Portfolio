services:
  - type: web
    name: portfolio
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: ADMIN_DASHBOARD_TOKEN
        sync: false
